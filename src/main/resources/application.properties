#======= Application Properties ========
app.name = ${app.name:LazyCo}
app.version = ${app.version:1.0.0}
app.environment = ${app.environment:development}
cookie.safe=${cookie.safe:true}

# ======== PostgreSQL configuration ========
db.driverClassName = org.postgresql.Driver
db.url = jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:lazyco}?tcpKeepAlive=${POSTGRES_TCP_KEEPALIVE:true}&socketTimeout=${POSTGRES_SOCKET_TIMEOUT:30}
db.username = ${POSTGRES_USER:postgres}
db.password = ${POSTGRES_PASSWORD:postgres}

# ========= Mongo Configuration ========
mongodb.host = ${MONGODB_HOST:localhost}
mongodb.port = ${MONGODB_PORT:27017}
mongodb.database = ${MONGODB_DATABASE:lazyco}
mongodb.username = ${MONGODB_USERNAME:}
mongodb.password = ${MONGODB_PASSWORD:}

# ======== HikariCP settings ========
hikari.maximumPoolSize = ${HIKARI_MAX_POOL_SIZE:30}
hikari.minimumIdle = ${HIKARI_MIN_IDLE:5}
hikari.idleTimeout = ${HIKARI_IDLE_TIMEOUT:600000}
hikari.connectionTimeout = ${HIKARI_CONNECTION_TIMEOUT:60000}
hikari.maxLifetime = ${HIKARI_MAX_LIFETIME:1800000}
hikari.leakDetectionThreshold = ${HIKARI_LEAK_DETECTION_THRESHOLD:0}
hikari.validationTimeout = ${HIKARI_VALIDATION_TIMEOUT:3000}
hikari.initializationFailTimeout = ${HIKARI_INITIALIZATION_FAIL_TIMEOUT:1}
hikari.keepaliveTime = ${HIKARI_KEEPALIVE_TIME:0}

# ======== Hibernate settings ========
hibernate.dialect = ${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
hibernate.hbm2ddl.auto = ${HIBERNATE_HBM2DDL_AUTO:validate}
hibernate.show_sql = ${HIBERNATE_SHOW_SQL:false}
hibernate.format_sql = ${HIBERNATE_FORMAT_SQL:true}
hibernate.jdbc.time_zone = ${HIBERNATE_JDBC_TIME_ZONE:UTC}

# ========= Hibernate Caching settings ========
hibernate.use_second_level_cache = true
hibernate.use_query_cache = true
hibernate.cache_region_factory_class = org.hibernate.cache.jcache.JCacheRegionFactory
hibernate.cache_provider_class = org.ehcache.jsr107.EhcacheCachingProvider
hibernate.javax.cache.uri = classpath:ehcache.xml

# ======== Auditing settings ========
hibernate.envers.enabled = ${HIBERNATE_ENVERS_ENABLED:false}
hibernate.envers.store_data_at_delete = ${HIBERNATE_ENVERS_STORE_DATA_AT_DELETE:true}
hibernate.envers.revision_on_collection_change = ${HIBERNATE_ENVERS_REVISION_ON_COLLECTION_CHANGE:true}

# ======== Transaction settings ========
spring.transaction.default-timeout = 120

# ======== Async Executor ========
spring.task.execution.pool.core-size = 10
spring.task.execution.pool.max-size = 50
spring.task.execution.pool.queue-capacity = 100
spring.task.execution.keep-alive-seconds = 60
spring.task.execution.shutdown-timeout-in-minutes = 3
spring.task.execution.thread-name-prefix = AsyncExecutor-
spring.task.execution.await-termination = true
spring.task.execution.allow-core-thread-timeout = true

# ======== Quartz Scheduler settings ========
spring.quartz.scheduler.instanceName = LazyCoQuartzScheduler
spring.quartz.threadPool.threadCount = 20
spring.quartz.threadPool.threadPriority=5

# ======== JobRunr settings ========
jobrunr.name = LazyCo Job Scheduler
jobrunr.dashboard.enabled = true
jobrunr.dashboard.port=8002
jobrunr.pool-interval-in-seconds = 10
jobrunr.delete-succeeded-jobs-after-days = 2
jobrunr.delete-deleted-jobs-after-days = 1

# ======== Email settings ========
email.smtp.host = sandbox.smtp.mailtrap.io
email.smtp.port = 2525
email.smtp.username = 0ed41b23f68ff7
email.smtp.password = b4bf1fbe56179c
